# Server port configuration
server.port=8080

# Database configuration for local test environment
# IMPORTANT: Replace the values below to match your local machine.

# 1. Replace "postgres" with the name of the database you created for testing.
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio_db

# 2. This is the default PostgreSQL user.
spring.datasource.username=postgres

# 3. Replace "admin" with the password of the "postgres" user on your machine.
#    (This password was set when you installed PostgreSQL).
spring.datasource.password=orca

# JPA/Hibernate configuration
# The 'ddl-auto=update' setting will automatically create the 'scores' table for you when the app runs.
# You do not need to create the table manually.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect